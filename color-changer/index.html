<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
    <link rel="stylesheet" href="./dist/output.css">
</head>
<body style="margin: 0; padding: 0;" class="h-screen">

    <div class="flex flex-row justify-center gap-4 h-12 p-2 bg-white rounded-xl shadow-md ">
        <span class=" button inline-block w-8 h-8 rounded-full bg-gray-400"  id="color-grey"></span>
        <span class=" button inline-block w-8 h-8 rounded-full bg-black" id="color-black"></span>
        <span class=" button inline-block w-8 h-8 rounded-full bg-blue-500" id="color-blue"></span>
        <span class=" button inline-block w-8 h-8 rounded-full bg-amber-400" id="color-yellow"></span> 
        <span class=" button inline-block w-8 h-8 rounded-full bg-white border-2" id="color-white"></span> 
    </div>

   <script type="text/javascript">
    const buttons = document.querySelectorAll('.button');
    const body=document.querySelector('body')
    // 

    buttons.forEach((button)=>{
        button.addEventListener('click', bgChange)

        function bgChange(eobj){

            if (eobj.target.id=='color-black'){
                body.style.backgroundColor='black';
                

            }
            if (eobj.target.id=='color-grey'){
                body.style.backgroundColor='grey';
                
                

            }
             if (eobj.target.id=='color-blue'){
                body.style.backgroundColor='blue';
                

            }
             if (eobj.target.id=='color-grey'){
                body.style.backgroundColor='grey';
                

            }
             if (eobj.target.id=='color-yellow'){
                body.style.backgroundColor='yellow';
                

            }
             if (eobj.target.id=='color-white'){
                body.style.backgroundColor='white';
                

            }
            
            
        }
        

    })
</script>

</body>
</html>
