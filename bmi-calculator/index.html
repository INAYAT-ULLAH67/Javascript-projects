<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen m-0 p-0 flex items-center justify-center bg-gray-100">

   <form action="#" class="bg-white p-6 rounded-xl shadow-md w-full max-w-sm flex flex-col gap-4">
    <h2 class="text-xl font-bold text-gray-800 mb-2 text-center">BMI Calculator</h2>
    
    <div>
        <label for="height" class="block text-sm font-medium text-gray-700 mb-1">Height in CM:</label>
        <input type="text" id="height" class="w-full px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., 175">
    </div>

    <div>
        <label for="weight" class="block text-sm font-medium text-gray-700 mb-1">Weight in KG:</label>
        <input type="text" id="weight" class="w-full px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., 70">
    </div>

    <button type="submit" class="w-full mt-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm rounded-lg shadow-sm transition-all active:scale-[0.98]">
        Calculate BMI
    </button>

    <div id="result" class="text-center font-semibold text-lg mt-2 text-gray-800"></div>
   </form>

   <script>
    const form = document.querySelector('form');

    form.addEventListener('submit', (eobj) => {
        // 1. Prevent the form from submitting and refreshing the page
        eobj.preventDefault();

        // 2. Grab the actual string values and convert them to floats
        const height = parseFloat(document.querySelector('#height').value);
        const weight = parseFloat(document.querySelector('#weight').value);
        const result = document.querySelector('#result');

        // 3. Validation Check
        if (isNaN(height) || height <= 0) {
            result.innerHTML = `<span class="text-red-500">Please provide a valid height.</span>`;
        } else if (isNaN(weight) || weight <= 0) {
            result.innerHTML = `<span class="text-red-500">Please provide a valid weight.</span>`;
        } else {
            // 4. Calculate BMI (Formula: weight / meters squared)
            // Height needs to be divided by 100 to convert CM to Meters
            const bmi = (weight / ((height * height) / 10000)).toFixed(2);
            
            // Determine weight category
            let category = "";
            if (bmi < 18.6) category = "Underweight";
            else if (bmi >= 18.6 && bmi <= 24.9) category = "Normal Weight";
            else category = "Overweight";

            // 5. Display the result
            result.innerHTML = `Your BMI is <span class="text-blue-600">${bmi}</span> (${category})`;
        }
    });
   </script>
</body>
</html>
